<router-outlet></router-outlet>

    <div routerLink="/order" routerLinkActive="text-orange-600" class="flex flex-col items-center gap-0.5 text-gray-400 cursor-pointer">
      <span class="text-lg">🏠</span>
      <span class="text-[10px] font-medium">Menu</span>
    </div>
    <div routerLink="/cart" routerLinkActive="text-orange-600" class="flex flex-col items-center gap-0.5 text-gray-400 cursor-pointer">
      <span class="text-lg">🛒</span>
      <span class="text-[10px]">Cart</span>
    </div>
    <div class="flex flex-col items-center gap-0.5 text-gray-300 cursor-not-allowed">
      <span class="text-lg">📋</span>
      <span class="text-[10px]">Orders</span>
    </div>
    <div class="flex flex-col items-center gap-0.5 text-gray-300 cursor-not-allowed">
      <span class="text-lg">👤</span>
      <span class="text-[10px]">Profile</span>
